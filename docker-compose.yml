services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader_password
      POSTGRES_DB: paper_trader
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgresql+asyncpg://trader:trader_password@db:5432/paper_trader
      EXCHANGE: ${EXCHANGE:-binance}
      API_KEY: ${API_KEY:-}
      API_SECRET: ${API_SECRET:-}
      RISK_PER_TRADE: ${RISK_PER_TRADE:-0.02}
      MAX_POSITIONS: ${MAX_POSITIONS:-5}
      PARTIAL_TP: ${PARTIAL_TP:-true}
      PARTIAL_TP_PCT: ${PARTIAL_TP_PCT:-0.5}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-change_me}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    environment:
      # VITE_ vars are read by the dev server at startup.
      # Browser calls go to YOUR MACHINE's localhost:8000, not the container's.
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
