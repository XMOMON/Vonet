databases:
  - name: paper_trader_db
    databaseName: paper_trader
    user: admin

services:
  - type: web
    name: paper-trader-backend
    env: python
    region: ohio
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: paper_trader_db
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: paper_trader_db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: EXCHANGE
        value: binance
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
